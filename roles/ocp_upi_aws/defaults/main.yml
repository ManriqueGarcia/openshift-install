---
ocp_version: "4.16"
ocp_version_full: ""
cluster_name: "test"
base_domain: "sandbox1269.opentlc.com"
aws_region: "eu-west-1"
aws_profile: "demo"
vpc_cidr: "10.0.0.0/16"

ocp_versions:
  "4.16": "4.16.32"
  "4.17": "4.17.50"
  "4.18": "4.18.20"
  "4.19": "4.19.24"
  "4.20": "4.20.15"
  "4.21": "4.21.4"

# rhcos_metadata_url, bin_dir, install_dir, terraform_dir y cluster_metadata_file
# se fijan en validate.yml según ocp_version_minor y ocp_version_full.

# Compute
master_instance_type: "m5.xlarge"
master_count: 3
worker_instance_type: "m5.large"
worker_count: 3
bootstrap_instance_type: "i3.xlarge"
root_volume_size: 120
root_volume_type: "gp3"

# Network & security
enable_dual_nic: false
allowed_ssh_cidrs: []
allowed_api_cidrs:
  - "0.0.0.0/0"
s3_force_destroy: true

# Secrets & keys
pull_secret_path: "{{ playbook_dir }}/pull-secret.txt"
ssh_key_name: "ocp-{{ cluster_name }}"
ssh_key_path: "{{ ansible_env.HOME }}/.ssh/{{ ssh_key_name }}"

# Paths (resueltos en roles/ocp_upi_aws/tasks/validate.yml)
bin_dir: ""
install_dir: ""
terraform_dir: ""
cluster_metadata_file: ""
rhcos_metadata_url: ""
force_destroy: false

# Timeouts & retries
bootstrap_timeout_seconds: 2700
bootstrap_poll_interval: 60
install_timeout_seconds: 2700
install_poll_interval: 60
csr_approval_retries: 10
csr_approval_pause_seconds: 30
aws_api_retries: 3
aws_api_retry_delay: 5

aws_env: "{{ {'AWS_PROFILE': aws_profile, 'AWS_DEFAULT_REGION': aws_region} if aws_profile else {'AWS_DEFAULT_REGION': aws_region} }}"

ocp_mirror_url: "https://mirror.openshift.com/pub/openshift-v4/clients/ocp"

terraform_version: "1.5.7"
terraform_url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip"
