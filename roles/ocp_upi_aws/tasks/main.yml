---
# === FASE 1: Resumen y validaciones previas ===

- name: Resolver version completa de OCP {{ ocp_version }}
  ansible.builtin.set_fact:
    ocp_version_full: "{{ ocp_version_full if ocp_version_full != '' else ocp_versions[ocp_version] }}"

- name: Mostrar resumen del despliegue
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  DESPLIEGUE OPENSHIFT UPI EN AWS"
      - "=========================================="
      - "  Cluster:    {{ cluster_name }}"
      - "  Version:    {{ ocp_version }} ({{ ocp_version_full }})"
      - "  Dominio:    {{ base_domain }}"
      - "  Region:     {{ aws_region }}"
      - "  Profile:    {{ aws_profile | default('default') }}"
      - "  Directorio: {{ install_dir }}"
      - "=========================================="

- name: Obtener metadatos RHCOS para OCP {{ ocp_version }}
  ansible.builtin.uri:
    url: "{{ rhcos_metadata_url }}"
    return_content: true
  register: rhcos_metadata

- name: Extraer AMI de RHCOS para {{ aws_region }}
  ansible.builtin.set_fact:
    rhcos_ami: "{{ (rhcos_metadata.content | from_json).architectures.x86_64.images.aws.regions[aws_region].image }}"

- name: Validar que la AMI existe en AWS
  ansible.builtin.command:
    cmd: >
      aws ec2 describe-images
      --image-ids {{ rhcos_ami }}
      --query 'Images[0].{ID:ImageId,Name:Name,State:State}'
      --output json
  environment: "{{ aws_env }}"
  register: ami_check
  changed_when: false

- name: Mostrar AMI resuelta
  ansible.builtin.debug:
    msg: "RHCOS AMI para {{ aws_region }}: {{ rhcos_ami }} - {{ (ami_check.stdout | from_json).Name }}"

- name: Verificar que la AMI esta disponible
  ansible.builtin.assert:
    that:
      - (ami_check.stdout | from_json).State == 'available'
    fail_msg: "La AMI {{ rhcos_ami }} no esta disponible en {{ aws_region }}"

# === FASE 2: Validar credenciales AWS ===

- name: Validar credenciales AWS
  ansible.builtin.command:
    cmd: aws sts get-caller-identity --output json
  environment: "{{ aws_env }}"
  register: aws_identity
  changed_when: false

- name: Mostrar identidad AWS
  ansible.builtin.debug:
    msg: "Cuenta AWS: {{ (aws_identity.stdout | from_json).Account }} - {{ (aws_identity.stdout | from_json).Arn }}"

- name: Validar que la region esta habilitada
  ansible.builtin.command:
    cmd: aws ec2 describe-availability-zones --query 'AvailabilityZones[0].State' --output text
  environment: "{{ aws_env }}"
  register: region_check
  changed_when: false

- name: Verificar que la region responde
  ansible.builtin.assert:
    that:
      - region_check.stdout == 'available'
    fail_msg: "La region {{ aws_region }} no esta habilitada o no responde en esta cuenta AWS"

# === FASE 3: Proteccion contra conflictos ===

- name: Comprobar si existe metadata de un cluster anterior
  ansible.builtin.stat:
    path: "{{ cluster_metadata_file }}"
  register: existing_metadata

- name: Leer metadata existente
  ansible.builtin.slurp:
    src: "{{ cluster_metadata_file }}"
  register: existing_metadata_content
  when: existing_metadata.stat.exists

- name: Validar que la configuracion coincide con el cluster existente
  ansible.builtin.assert:
    that:
      - (existing_metadata_content.content | b64decode | from_json).aws_region == aws_region
      - (existing_metadata_content.content | b64decode | from_json).ocp_version == ocp_version
      - (existing_metadata_content.content | b64decode | from_json).cluster_name == cluster_name
    fail_msg: >
      CONFLICTO DETECTADO: Ya existe un cluster en este directorio con configuracion diferente.
      Existente: {{ existing_metadata_content.content | b64decode }}
      Solicitado: cluster_name={{ cluster_name }}, ocp_version={{ ocp_version }}, aws_region={{ aws_region }}.
      Usa un cluster_name diferente o elimina el directorio {{ install_dir }} manualmente.
  when: existing_metadata.stat.exists

- name: Comprobar si existe terraform state
  ansible.builtin.stat:
    path: "{{ terraform_dir }}/terraform.tfstate"
  register: existing_tfstate

- name: Verificar recursos en terraform state existente
  ansible.builtin.command:
    cmd: terraform state list
    chdir: "{{ terraform_dir }}"
  register: tf_state_list
  changed_when: false
  when: existing_tfstate.stat.exists
  ignore_errors: true

- name: ALERTA - Infraestructura existente detectada
  ansible.builtin.debug:
    msg: >
      ATENCION: Se han detectado {{ tf_state_list.stdout_lines | length }} recursos existentes
      en el terraform state de {{ install_dir }}.
      Si continuas, Terraform sincronizara el estado con la configuracion actual.
  when:
    - existing_tfstate.stat.exists
    - tf_state_list is succeeded
    - tf_state_list.stdout_lines | length > 0

# === FASE 4: Detectar recursos huerfanos (IAM + ELBv2) ===

- name: Buscar roles IAM huerfanos con prefijo {{ cluster_name }}
  ansible.builtin.command:
    cmd: >
      aws iam list-roles
      --query "Roles[?starts_with(RoleName,'{{ cluster_name }}-')].RoleName"
      --output json
  environment: "{{ aws_env }}"
  register: existing_iam_roles
  changed_when: false

- name: Buscar policies IAM huerfanas con prefijo {{ cluster_name }}
  ansible.builtin.command:
    cmd: >
      aws iam list-policies --scope Local
      --query "Policies[?starts_with(PolicyName,'{{ cluster_name }}-')].PolicyName"
      --output json
  environment: "{{ aws_env }}"
  register: existing_iam_policies
  changed_when: false

- name: Verificar que no hay recursos IAM huerfanos
  ansible.builtin.assert:
    that:
      - (existing_iam_roles.stdout | from_json | length) == 0
      - (existing_iam_policies.stdout | from_json | length) == 0
    fail_msg: >
      RECURSOS IAM HUERFANOS DETECTADOS que pueden causar conflictos.
      Roles: {{ existing_iam_roles.stdout }}
      Policies: {{ existing_iam_policies.stdout }}
      Eliminalos manualmente antes de continuar o usa un cluster_name diferente.
  when: not (existing_tfstate.stat.exists | default(false))

- name: Buscar Load Balancers huerfanos con prefijo {{ cluster_name }}
  ansible.builtin.command:
    cmd: >
      aws elbv2 describe-load-balancers
      --query "LoadBalancers[?contains(LoadBalancerName,'{{ cluster_name }}-')].LoadBalancerName"
      --output json
  environment: "{{ aws_env }}"
  register: existing_lbs
  changed_when: false

- name: Buscar Target Groups huerfanos con prefijo {{ cluster_name }}
  ansible.builtin.command:
    cmd: >
      aws elbv2 describe-target-groups
      --query "TargetGroups[?contains(TargetGroupName,'{{ cluster_name }}-')].TargetGroupName"
      --output json
  environment: "{{ aws_env }}"
  register: existing_tgs
  changed_when: false

- name: Verificar que no hay recursos ELBv2 huerfanos
  ansible.builtin.assert:
    that:
      - (existing_lbs.stdout | from_json | length) == 0
      - (existing_tgs.stdout | from_json | length) == 0
    fail_msg: >
      RECURSOS ELBv2 HUERFANOS DETECTADOS en {{ aws_region }}.
      Load Balancers: {{ existing_lbs.stdout }}
      Target Groups: {{ existing_tgs.stdout }}
      Eliminalos manualmente antes de continuar o usa un cluster_name diferente.
  when: not (existing_tfstate.stat.exists | default(false))

# === FASE 5: Validar zona Route53 ===

- name: Verificar que existe la zona Route53 para {{ base_domain }}
  ansible.builtin.command:
    cmd: >
      aws route53 list-hosted-zones-by-name
      --dns-name {{ base_domain }}
      --max-items 1
      --query "HostedZones[?Name=='{{ base_domain }}.'].Id"
      --output json
  environment: "{{ aws_env }}"
  register: route53_zone
  changed_when: false

- name: Verificar que la zona DNS existe
  ansible.builtin.assert:
    that:
      - (route53_zone.stdout | from_json | length) > 0
    fail_msg: >
      No se encontro la zona Route53 para '{{ base_domain }}'.
      Asegurate de que la zona existe en la cuenta AWS '{{ (aws_identity.stdout | from_json).Account }}'.

- name: Extraer ID de la zona Route53
  ansible.builtin.set_fact:
    route53_zone_id: "{{ (route53_zone.stdout | from_json)[0] | regex_replace('.*/hostedzone/', '') | regex_replace('\"', '') }}"

- name: Mostrar zona Route53
  ansible.builtin.debug:
    msg: "Zona Route53 encontrada para {{ base_domain }}: {{ route53_zone_id }}"

- name: Buscar registros DNS existentes para api.{{ cluster_name }}.{{ base_domain }}
  ansible.builtin.command:
    cmd: >
      aws route53 list-resource-record-sets
      --hosted-zone-id {{ route53_zone_id }}
      --query "ResourceRecordSets[?Name=='api.{{ cluster_name }}.{{ base_domain }}.' || Name=='api-int.{{ cluster_name }}.{{ base_domain }}.' || Name=='\\*.apps.{{ cluster_name }}.{{ base_domain }}.'].Name"
      --output json
  environment: "{{ aws_env }}"
  register: existing_dns_records
  changed_when: false

- name: Verificar que no hay registros DNS huerfanos para {{ cluster_name }}.{{ base_domain }}
  ansible.builtin.assert:
    that:
      - (existing_dns_records.stdout | from_json | length) == 0
    fail_msg: >
      REGISTROS DNS EXISTENTES DETECTADOS en la zona {{ base_domain }}.
      Registros: {{ existing_dns_records.stdout }}
      Ya existe un cluster con nombre '{{ cluster_name }}' en el dominio '{{ base_domain }}'.
      Destruye el cluster existente primero o usa un cluster_name diferente.
  when: not (existing_tfstate.stat.exists | default(false))

# === FASE 6: Crear directorios y guardar metadata ===

- name: Crear directorio de instalacion
  ansible.builtin.file:
    path: "{{ install_dir }}"
    state: directory
    mode: "0755"

- name: Guardar metadata del cluster
  ansible.builtin.copy:
    content: |
      {
        "cluster_name": "{{ cluster_name }}",
        "ocp_version": "{{ ocp_version }}",
        "ocp_version_full": "{{ ocp_version_full }}",
        "aws_region": "{{ aws_region }}",
        "aws_profile": "{{ aws_profile }}",
        "base_domain": "{{ base_domain }}",
        "rhcos_ami": "{{ rhcos_ami }}",
        "created_at": "{{ ansible_date_time.iso8601 }}"
      }
    dest: "{{ cluster_metadata_file }}"
    mode: "0644"

- name: Crear directorio de binarios para version {{ ocp_version }}
  ansible.builtin.file:
    path: "{{ bin_dir }}"
    state: directory
    mode: "0755"

# === FASE 7: Descargar binarios ===

- name: Descargar openshift-install {{ ocp_version_full }}
  ansible.builtin.unarchive:
    src: "{{ ocp_mirror_url }}/{{ ocp_version_full }}/openshift-install-linux-{{ ocp_version_full }}.tar.gz"
    dest: "{{ bin_dir }}"
    remote_src: true
    creates: "{{ bin_dir }}/openshift-install"

- name: Descargar cliente oc {{ ocp_version_full }}
  ansible.builtin.unarchive:
    src: "{{ ocp_mirror_url }}/{{ ocp_version_full }}/openshift-client-linux-{{ ocp_version_full }}.tar.gz"
    dest: "{{ bin_dir }}"
    remote_src: true
    creates: "{{ bin_dir }}/oc"

- name: Verificar openshift-install
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/openshift-install version"
  changed_when: false

- name: Verificar cliente oc
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/oc version --client"
  changed_when: false

# === FASE 8: Generar SSH key ===

- name: Comprobar si existe la clave SSH
  ansible.builtin.stat:
    path: "{{ ssh_key_path }}"
  register: ssh_key_stat

- name: Generar clave SSH para el cluster
  community.crypto.openssh_keypair:
    path: "{{ ssh_key_path }}"
    type: ed25519
    comment: "ocp-{{ cluster_name }}"
    mode: "0600"
  when: not ssh_key_stat.stat.exists

- name: Leer clave publica SSH
  ansible.builtin.slurp:
    src: "{{ ssh_key_path }}.pub"
  register: ssh_pub_key

# === FASE 9: Generar install-config e ignition ===

- name: Leer pull secret
  ansible.builtin.slurp:
    src: "{{ pull_secret_path }}"
  register: pull_secret_content

- name: Crear directorio de instalacion OCP
  ansible.builtin.file:
    path: "{{ install_dir }}/ocp"
    state: directory
    mode: "0755"

- name: Generar install-config.yaml
  ansible.builtin.template:
    src: install-config.yaml.j2
    dest: "{{ install_dir }}/ocp/install-config.yaml"
    mode: "0640"

- name: Guardar copia de install-config.yaml
  ansible.builtin.copy:
    src: "{{ install_dir }}/ocp/install-config.yaml"
    dest: "{{ install_dir }}/install-config.yaml.bak"
    mode: "0640"
    remote_src: true

- name: Generar manifiestos
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/openshift-install create manifests --dir={{ install_dir }}/ocp"
    creates: "{{ install_dir }}/ocp/manifests"
  environment: "{{ aws_env }}"

- name: Extraer infra ID del cluster desde manifiestos
  ansible.builtin.shell:
    cmd: "grep -r 'infrastructureName' {{ install_dir }}/ocp/manifests/ | head -1 | grep -oP 'infrastructureName:\\s*\\K\\S+'"
  register: infra_id_result
  changed_when: false

- name: Registrar infra ID
  ansible.builtin.set_fact:
    infra_id: "{{ infra_id_result.stdout }}"

- name: Mostrar infra ID
  ansible.builtin.debug:
    msg: "Infra ID del cluster: {{ infra_id }}"

- name: Configurar masters como no schedulable
  ansible.builtin.lineinfile:
    path: "{{ install_dir }}/ocp/manifests/cluster-scheduler-02-config.yml"
    regexp: "mastersSchedulable"
    line: "  mastersSchedulable: false"

- name: Buscar manifiesto de ControlPlaneMachineSet
  ansible.builtin.find:
    paths: "{{ install_dir }}/ocp/manifests"
    patterns: "*control-plane-machine-set*"
  register: cpms_manifest

- name: Desactivar ControlPlaneMachineSet en manifiesto (UPI)
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: 'state:\s*Active'
    replace: 'state: Inactive'
  loop: "{{ cpms_manifest.files }}"
  when: cpms_manifest.matched > 0

- name: "AVISO UPI - ControlPlaneMachineSet = Inactive"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  ControlPlaneMachineSet -> Inactive"
      - "=========================================="
      - "  En instalaciones UPI no hay Machine API gestionando"
      - "  los masters. Se ha configurado el CPMS como Inactive"
      - "  en los manifiestos para que no bloquee la instalacion."
      - "  Esto es normal y esperado en UPI."
      - "=========================================="
  when: cpms_manifest.matched > 0

- name: Generar ignition configs
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/openshift-install create ignition-configs --dir={{ install_dir }}/ocp"
    creates: "{{ install_dir }}/ocp/bootstrap.ign"
  environment: "{{ aws_env }}"

# === FASE 10: Terraform ===

- name: Copiar ficheros de terraform
  ansible.builtin.copy:
    src: "terraform/"
    dest: "{{ terraform_dir }}/"
    mode: "0644"

- name: Generar terraform.tfvars
  ansible.builtin.template:
    src: terraform.tfvars.j2
    dest: "{{ terraform_dir }}/terraform.tfvars"
    mode: "0640"

- name: Actualizar ruta de bootstrap.ign en s3.tf
  ansible.builtin.replace:
    path: "{{ terraform_dir }}/s3.tf"
    regexp: 'source\s*=\s*"[^"]*bootstrap\.ign"'
    replace: 'source = "{{ install_dir }}/ocp/bootstrap.ign"'

- name: Terraform init
  ansible.builtin.command:
    cmd: terraform init
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  changed_when: false

- name: Terraform plan
  ansible.builtin.command:
    cmd: terraform plan -out=cluster.plan
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  register: tf_plan

- name: Mostrar plan de terraform
  ansible.builtin.debug:
    var: tf_plan.stdout_lines

- name: Terraform apply
  ansible.builtin.command:
    cmd: terraform apply -auto-approve cluster.plan
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  register: tf_apply

- name: Mostrar resultado de terraform
  ansible.builtin.debug:
    var: tf_apply.stdout_lines

# === FASE 11: Esperar al bootstrap ===

- name: Esperar a que el bootstrap complete (timeout 45min)
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/openshift-install wait-for bootstrap-complete --dir={{ install_dir }}/ocp --log-level=info"
  environment: "{{ aws_env }}"
  register: bootstrap_result
  changed_when: false
  async: 2700
  poll: 60
  ignore_errors: true

- name: Consultar estado de nodos durante bootstrap
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/oc get nodes --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig"
  environment: "{{ aws_env }}"
  register: nodes_status
  changed_when: false
  ignore_errors: true

- name: Consultar estado de etcd durante bootstrap
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/oc get pods -n openshift-etcd --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig -o wide"
  environment: "{{ aws_env }}"
  register: etcd_status
  changed_when: false
  ignore_errors: true

- name: "ESTADO BOOTSTRAP - {{ cluster_name }} {{ ocp_version }} ({{ aws_region }})"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  RESULTADO DEL BOOTSTRAP"
      - "=========================================="
      - "  Exito: {{ 'SI' if bootstrap_result.rc | default(1) == 0 else 'NO' }}"
      - "=========================================="
      - "  NODOS:"
      - "{{ nodes_status.stdout | default('No disponible') }}"
      - "=========================================="
      - "  ETCD:"
      - "{{ etcd_status.stdout | default('No disponible') }}"
      - "=========================================="

- name: Fallar si el bootstrap no completo
  ansible.builtin.fail:
    msg: >
      El bootstrap no completo en el tiempo esperado (45min).
      Revisa el estado con:
        export KUBECONFIG={{ install_dir }}/ocp/auth/kubeconfig
        {{ bin_dir }}/oc get nodes
        {{ bin_dir }}/oc get co
        {{ bin_dir }}/oc get pods -n openshift-etcd
  when: bootstrap_result.rc | default(1) != 0

# === FASE 12: Aprobar CSRs de workers ===

- name: Aprobar CSRs pendientes de workers (intento {{ item }}/10)
  ansible.builtin.shell: |
    pending=$({{ bin_dir }}/oc get csr --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig -o json | python3 -c "
    import json,sys
    csrs = json.load(sys.stdin)['items']
    pending = [c['metadata']['name'] for c in csrs if not c.get('status',{}).get('conditions')]
    print(' '.join(pending))
    ")
    if [ -n "$pending" ]; then
      for csr in $pending; do
        {{ bin_dir }}/oc adm certificate approve $csr --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig
      done
    fi
  environment: "{{ aws_env }}"
  register: csr_approve
  changed_when: "'approved' in (csr_approve.stdout | default(''))"
  loop: "{{ range(1, 11) | list }}"
  loop_control:
    pause: 30

- name: Consultar nodos tras aprobar CSRs
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/oc get nodes --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig"
  environment: "{{ aws_env }}"
  register: nodes_after_csr
  changed_when: false

- name: "ESTADO NODOS - {{ cluster_name }} {{ ocp_version }} ({{ aws_region }})"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  NODOS REGISTRADOS"
      - "=========================================="
      - "{{ nodes_after_csr.stdout }}"
      - "=========================================="

# === FASE 13: Esperar a que la instalacion complete ===

- name: Esperar a que la instalacion complete (timeout 45min)
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/openshift-install wait-for install-complete --dir={{ install_dir }}/ocp --log-level=info"
  environment: "{{ aws_env }}"
  register: install_result
  changed_when: false
  async: 2700
  poll: 60
  ignore_errors: true

- name: Consultar estado final de operadores
  ansible.builtin.shell: |
    echo "OPERADORES CON PROBLEMAS:"
    {{ bin_dir }}/oc get co --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig 2>&1 | grep -vE "True.*False.*False$" | grep -v "^$"
    echo ""
    echo "TODOS LOS OPERADORES:"
    {{ bin_dir }}/oc get co --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig 2>&1
  environment: "{{ aws_env }}"
  register: co_status
  changed_when: false
  ignore_errors: true

- name: Consultar estado final de nodos
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/oc get nodes --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig"
  environment: "{{ aws_env }}"
  register: final_nodes
  changed_when: false
  ignore_errors: true

- name: Consultar clusterversion final
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/oc get clusterversion --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig"
  environment: "{{ aws_env }}"
  register: cv_status
  changed_when: false
  ignore_errors: true

- name: Leer credenciales del cluster
  ansible.builtin.slurp:
    src: "{{ install_dir }}/ocp/auth/kubeadmin-password"
  register: kubeadmin_password
  ignore_errors: true

- name: Obtener URL de consola
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/oc get route console -n openshift-console --kubeconfig={{ install_dir }}/ocp/auth/kubeconfig -o jsonpath='{.spec.host}'"
  environment: "{{ aws_env }}"
  register: console_url
  changed_when: false
  ignore_errors: true

- name: "RESULTADO FINAL - {{ cluster_name }} {{ ocp_version }} ({{ aws_region }})"
  ansible.builtin.debug:
    msg:
      - "============================================================"
      - "  RESULTADO DE LA INSTALACION - {{ cluster_name }}"
      - "============================================================"
      - "  Version:    {{ ocp_version }} ({{ ocp_version_full }})"
      - "  Region:     {{ aws_region }}"
      - "  Estado:     {{ 'COMPLETADA' if install_result.rc | default(1) == 0 else 'CON ERRORES' }}"
      - "============================================================"
      - ""
      - "  CLUSTERVERSION:"
      - "{{ cv_status.stdout | default('No disponible') }}"
      - ""
      - "  NODOS:"
      - "{{ final_nodes.stdout | default('No disponible') }}"
      - ""
      - "{{ co_status.stdout | default('No disponible') }}"
      - ""
      - "============================================================"
      - "  ACCESO AL CLUSTER"
      - "============================================================"
      - "  Consola:    https://{{ console_url.stdout | default('no disponible aun') }}"
      - "  API:        https://api.{{ cluster_name }}.{{ base_domain }}:6443"
      - "  Usuario:    kubeadmin"
      - "  Password:   {{ kubeadmin_password.content | default('') | b64decode | default('no disponible') }}"
      - "  Kubeconfig: {{ install_dir }}/ocp/auth/kubeconfig"
      - ""
      - "  Para usar oc:"
      - "    export KUBECONFIG={{ install_dir }}/ocp/auth/kubeconfig"
      - "    export PATH={{ bin_dir }}:$PATH"
      - "============================================================"

- name: Fallar si la instalacion no completo
  ansible.builtin.fail:
    msg: >
      La instalacion no completo correctamente.
      Revisa los operadores con problemas en el resumen anterior.
      Puedes seguir monitorizando con:
        export KUBECONFIG={{ install_dir }}/ocp/auth/kubeconfig
        {{ bin_dir }}/oc get co
  when: install_result.rc | default(1) != 0
