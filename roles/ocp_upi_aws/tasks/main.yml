# Orquestador principal — cada fase en su propio fichero

- name: "FASE 1-5: Validaciones previas"
  ansible.builtin.include_tasks: validate.yml
  tags: [validate]

- name: "FASE 6-8: Preparar directorios, binarios y SSH key"
  ansible.builtin.include_tasks: prepare.yml
  tags: [prepare, download]

- name: "FASE 9: Generar install-config, manifiestos e ignition"
  ansible.builtin.include_tasks: ignition.yml
  tags: [ignition]

- name: "FASE 10: Terraform init, plan y apply"
  ansible.builtin.include_tasks: terraform.yml
  tags: [terraform]

- name: "FASE 11: Esperar bootstrap"
  ansible.builtin.include_tasks: bootstrap.yml
  tags: [bootstrap]

- name: "FASE 12-13: Aprobar CSRs y esperar instalación"
  ansible.builtin.include_tasks: install.yml
  tags: [install]
