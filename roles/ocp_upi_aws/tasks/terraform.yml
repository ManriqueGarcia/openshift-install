---
# === FASE 10: Terraform ===

- name: Copiar ficheros de terraform
  ansible.builtin.copy:
    src: "terraform/"
    dest: "{{ terraform_dir }}/"
    mode: "0644"

- name: Generar terraform.tfvars
  ansible.builtin.template:
    src: terraform.tfvars.j2
    dest: "{{ terraform_dir }}/terraform.tfvars"
    mode: "0640"

- name: Terraform init
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/terraform init"
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  register: tf_init
  changed_when: "'Initializing provider plugins' in tf_init.stdout"

- name: Terraform plan
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/terraform plan -out=cluster.plan"
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  register: tf_plan

- name: Mostrar resumen del plan terraform (ultimas 40 lineas)
  ansible.builtin.debug:
    msg: "{{ (tf_plan.stdout_lines | length > 40) | ternary(tf_plan.stdout_lines[-40:] | join('\n'), tf_plan.stdout | default('') | trim) }}"

- name: Terraform apply
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/terraform apply -no-color -auto-approve cluster.plan"
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  register: tf_apply
  changed_when: "'Apply complete' in tf_apply.stdout"

- name: Mostrar resultado de terraform (ultimas 50 lineas)
  ansible.builtin.debug:
    msg: "{{ (tf_apply.stdout_lines | length > 50) | ternary(tf_apply.stdout_lines[-50:] | join('\n'), tf_apply.stdout | default('') | trim) }}"
