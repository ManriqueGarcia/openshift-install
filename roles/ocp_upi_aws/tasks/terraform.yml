---
# === FASE 10: Terraform ===

- name: Copiar ficheros de terraform
  ansible.builtin.copy:
    src: "terraform/"
    dest: "{{ terraform_dir }}/"
    mode: "0644"

- name: Generar terraform.tfvars
  ansible.builtin.template:
    src: terraform.tfvars.j2
    dest: "{{ terraform_dir }}/terraform.tfvars"
    mode: "0640"

- name: Terraform init
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/terraform init"
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  register: tf_init
  changed_when: "'Initializing provider plugins' in tf_init.stdout"

- name: Terraform plan
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/terraform plan -out=cluster.plan"
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  register: tf_plan

- name: Mostrar plan de terraform
  ansible.builtin.debug:
    var: tf_plan.stdout_lines

- name: Terraform apply
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/terraform apply -auto-approve cluster.plan"
    chdir: "{{ terraform_dir }}"
  environment: "{{ aws_env }}"
  register: tf_apply
  changed_when: "'Apply complete' in tf_apply.stdout"

- name: Mostrar resultado de terraform
  ansible.builtin.debug:
    var: tf_apply.stdout_lines
